name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run tests with coverage
      run: |
        pip install pytest pytest-cov
        export PYTHONPATH=$PYTHONPATH:.
        pytest --cov=src tests/